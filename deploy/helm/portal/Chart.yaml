apiVersion: v2
name: portal
description: OpenTofu Lifecycle Management UI
type: application
version: 0.1.0
appVersion: "0.1.0"

# Portal bundles no database, cache, or object store — it speaks to managed
# external services: Postgres (RDS), Redis (ElastiCache), and S3, configured via
# database.url / redis.url / objectStore in values.yaml. This keeps the chart
# entirely off the archived Bitnami catalog: the postgresql + redis subcharts
# moved to the bitnamilegacy namespace (unpatched, ImagePullBackOff-prone), and
# minio was already dropped for external S3 (#35). For local development,
# `task dev` brings up Postgres + Redis via docker-compose, not this chart.
