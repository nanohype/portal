apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.config.jwtSecret | quote }}
  ENCRYPTION_KEY: {{ .Values.config.encryptionKey | quote }}
  GITHUB_CLIENT_ID: {{ .Values.config.githubClientID | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.config.githubClientSecret | quote }}
  WEBHOOK_SECRET: {{ .Values.config.webhookSecret | quote }}
  S3_ACCESS_KEY: {{ .Values.objectStore.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.objectStore.secretKey | quote }}
  # Connection URLs carry credentials, so they live here, not the ConfigMap.
  # database.url is required — there is no bundled database to fall back to.
  DATABASE_URL: {{ required "database.url is required: point portal at a managed Postgres (e.g. RDS). There is no bundled database." .Values.database.url | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
