apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app.kubernetes.io/name: portal-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      app.kubernetes.io/name: portal-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if or .Values.argocdSync.enabled .Values.clusterWatchback.enabled .Values.clusterHealth.enabled }}
      serviceAccountName: {{ .Release.Name }}-worker
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Release.Name }}-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.gitops.sshKey }}
            - name: git-ssh
              mountPath: /etc/portal/git-ssh
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources.worker | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.gitops.sshKey }}
        - name: git-ssh
          secret:
            secretName: {{ .Release.Name }}-git-ssh
            defaultMode: 0400
        {{- end }}
