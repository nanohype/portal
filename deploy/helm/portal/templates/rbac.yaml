{{- if or .Values.argocdSync.enabled .Values.clusterWatchback.enabled .Values.clusterHealth.enabled .Values.unwedge.enabled }}
# RBAC for the worker's in-cluster reads. Created when argocdSync, clusterWatchback,
# clusterHealth, OR unwedge is enabled. The worker watches Platform/Tenant CRs and
# (for the provision watch-back) the eks-fleet Cluster XRs cluster-wide; with
# argocdSync it reads ArgoCD's cluster Secrets, and with clusterHealth the
# per-cluster ArgoCD Applications — both scoped to argocdSync.namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-worker
  {{- with .Values.serviceAccount.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ . | quote }}  # IRSA — AWS creds for cluster-status reads
  {{- end }}
  labels:
    app.kubernetes.io/name: portal-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-worker
rules:
  - apiGroups: ["platform.nanohype.dev"]
    resources: ["tenants", "platforms"]
    verbs: ["get", "list", "watch"]
  {{- if .Values.clusterWatchback.enabled }}
  # The provision watch-back reads vended-cluster XRs on the hub.
  - apiGroups: ["fleet.nanohype.dev"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]
  {{- end }}
  {{- if or .Values.clusterWatchback.enabled .Values.unwedge.enabled }}
  # The provider-opentofu Workspaces the cluster XRs drive. The watch-back reads
  # .status.conditions[] for the vend timeline; the break-glass unwedge worker
  # additionally patches metadata.finalizers to release a Workspace stuck on
  # external-create-pending, once it has cleared the spoke's AWS resources.
  - apiGroups: ["opentofu.m.upbound.io"]
    resources: ["workspaces"]
    verbs: ["get", "list", "watch"{{- if .Values.unwedge.enabled }}, "patch"{{- end }}]
  {{- end }}
  - apiGroups: [""]
    resources: ["nodes", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-worker
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-worker
    namespace: {{ .Release.Namespace }}
{{- if .Values.argocdSync.enabled }}
---
# Read only ArgoCD's cluster Secrets, scoped to the argocd namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-argocd-reader
  namespace: {{ .Values.argocdSync.namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-argocd-reader
  namespace: {{ .Values.argocdSync.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-argocd-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-worker
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.clusterHealth.enabled }}
---
# Read the per-cluster ArgoCD Applications (cluster-<env>-<name>) the health
# watcher surfaces, scoped to the argocd namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-argocd-apps-reader
  namespace: {{ .Values.argocdSync.namespace }}
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-argocd-apps-reader
  namespace: {{ .Values.argocdSync.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-argocd-apps-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-worker
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
