apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  SERVER_ADDR: {{ .Values.config.serverAddr | quote }}
  SERVER_BASE_URL: {{ .Values.config.serverBaseURL | quote }}
  WEB_URL: {{ .Values.config.webURL | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  S3_ENDPOINT: {{ .Values.objectStore.endpoint | quote }}
  S3_BUCKET: {{ .Values.objectStore.bucket | quote }}
  S3_USE_SSL: {{ .Values.objectStore.useSSL | quote }}
  S3_REGION: {{ .Values.objectStore.region | quote }}
  S3_ACCESS_KEY: {{ .Values.objectStore.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.objectStore.secretKey | quote }}
  EXECUTOR_TYPE: {{ .Values.config.executorType | quote }}
  WORKER_CONCURRENCY: {{ .Values.config.workerConcurrency | quote }}
  JWT_EXPIRATION: {{ .Values.config.jwtExpiration | quote }}
  SHUTDOWN_TIMEOUT: {{ .Values.config.shutdownTimeout | quote }}
  EXECUTOR_NAMESPACE: {{ .Values.config.executorNamespace | quote }}
  EXECUTOR_IMAGE: {{ .Values.config.executorImage | quote }}
  WORKER_HEALTH_ADDR: {{ .Values.config.workerHealthAddr | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  DB_MAX_CONNS: {{ .Values.config.dbMaxConns | quote }}
  DB_MIN_CONNS: {{ .Values.config.dbMinConns | quote }}
  {{- if .Values.gitops.sshKey }}
  GITOPS_SSH_KEY_PATH: "/etc/portal/git-ssh/id_ed25519"
  GITOPS_AUTHOR_NAME: {{ .Values.gitops.authorName | quote }}
  GITOPS_AUTHOR_EMAIL: {{ .Values.gitops.authorEmail | quote }}
  {{- end }}
  {{- if .Values.gitops.clustersRepoURL }}
  GITOPS_CLUSTERS_REPO_URL: {{ .Values.gitops.clustersRepoURL | quote }}
  GITOPS_CLUSTERS_REPO_REF: {{ .Values.gitops.clustersRepoRef | quote }}
  {{- end }}
  {{- if .Values.fleet.hubRoleArn }}
  FLEET_HUB_ROLE_ARN: {{ .Values.fleet.hubRoleArn | quote }}
  {{- end }}
  {{- if .Values.gitops.tenantsRepoURL }}
  GITOPS_TENANTS_REPO_URL: {{ .Values.gitops.tenantsRepoURL | quote }}
  GITOPS_TENANTS_REPO_REF: {{ .Values.gitops.tenantsRepoRef | quote }}
  {{- end }}
  {{- if .Values.clusterWatchback.enabled }}
  CLUSTER_WATCHBACK_ENABLED: "true"
  CLUSTER_WATCHBACK_INTERVAL: {{ .Values.clusterWatchback.interval | quote }}
  {{- end }}
  {{- if .Values.clusterHealth.enabled }}
  CLUSTER_HEALTH_ENABLED: "true"
  CLUSTER_HEALTH_INTERVAL: {{ .Values.clusterHealth.interval | quote }}
  {{- end }}
  {{- if or .Values.argocdSync.enabled .Values.clusterHealth.enabled }}
  # The argocd namespace on the hub — holds the cluster-registry Secrets
  # (argocdSync) and the per-cluster Applications (clusterHealth).
  ARGOCD_NAMESPACE: {{ .Values.argocdSync.namespace | quote }}
  {{- end }}
  {{- if .Values.argocdSync.enabled }}
  ARGOCD_CLUSTER_SYNC: "true"
  ARGOCD_SYNC_INTERVAL: {{ .Values.argocdSync.syncInterval | quote }}
  ARGOCD_SYNC_ORG_ID: {{ .Values.argocdSync.orgID | quote }}
  ARGOCD_SYNC_ACCOUNT_ID: {{ .Values.argocdSync.accountID | quote }}
  ARGOCD_SYNC_CREATED_BY: {{ .Values.argocdSync.createdBy | quote }}
  {{- end }}
  {{- if .Values.tracing.enabled }}
  # Traces are pushed (OTLP), not scraped — no pod annotation needed, just the
  # endpoint. service.name is set per-process in code (portal-server/worker).
  OTEL_TRACES_ENABLED: "true"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.tracing.otlpEndpoint | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.tracing.otlpProtocol | quote }}
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.tracing.sampleRatio | quote }}
  {{- end }}
