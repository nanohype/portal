{{- if .Values.gitops.sshKey }}
# The git deploy key the worker uses to push to the tenant/cluster GitOps repos.
# Mounted read-only at GITOPS_SSH_KEY_PATH on the worker — kept out of the env
# (envFrom) so the key never lands in the process environment.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-git-ssh
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  id_ed25519: |
    {{- .Values.gitops.sshKey | nindent 4 }}
{{- end }}
