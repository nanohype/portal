# -- Replica counts for each component
replicaCount:
  server: 1
  worker: 1   # Only 1 worker recommended — River handles concurrency internally
  web: 1

# -- Container images
image:
  server:
    repository: portal/server
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: portal/worker
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: portal/web
    tag: latest
    pullPolicy: IfNotPresent
  migrate:
    repository: portal/migrate
    tag: latest
    pullPolicy: IfNotPresent

# -- Application configuration
# Secrets (jwtSecret, encryptionKey, githubClientSecret, webhookSecret, S3 creds)
# are stored in a Kubernetes Secret. Everything else goes in a ConfigMap.
config:
  # Server
  serverAddr: ":8080"
  serverBaseURL: "http://localhost:8080"      # Public URL — set to your domain in production
  webURL: "http://localhost:5173"             # Frontend URL — set to your domain in production
  environment: "development"                  # "development" | "staging" | "production"
  logLevel: "info"                            # "debug" | "info" | "warn" | "error"
  shutdownTimeout: "15s"

  # Auth — create a GitHub OAuth App and set these
  githubClientID: ""
  githubClientSecret: ""

  # Security — MUST change these in production
  jwtSecret: "dev-secret-change-in-production"
  jwtExpiration: "24h"
  encryptionKey: "dev-encryption-key-32bytes!!!!!!"  # Must be exactly 32 bytes
  webhookSecret: ""                                   # HMAC secret for GitHub webhooks

  # Executor — "local" runs tofu on the worker host, "kubernetes" uses ephemeral pods
  executorType: "local"
  executorNamespace: "portal"                  # K8s namespace for executor pods
  executorImage: "portal-executor:tofu-1.11"   # Default executor image

  # Worker
  workerConcurrency: "10"
  workerHealthAddr: ":8081"

  # Object store config (endpoint/bucket/region/creds) lives under objectStore below.

  # Database tuning
  dbMaxConns: "25"
  dbMinConns: "5"

# -- PostgreSQL subchart (Bitnami)
postgresql:
  enabled: true
  auth:
    username: portal
    password: portal          # Change in production
    database: portal
  primary:
    persistence:
      size: 1Gi

# -- Redis subchart (Bitnami)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 256Mi

# -- MinIO subchart (Bitnami)
# -- Object store (S3-compatible) for OpenTofu state + run logs. Portal speaks the
# generic S3 API (minio-go client, static creds), so this points at anything
# S3-compatible. No store is bundled — the chart stays off the deprecated Bitnami
# catalog, and the in-cluster/production home is real object storage:
#   - Real hub: an AWS S3 bucket + a scoped access key. endpoint:
#     s3.<region>.amazonaws.com, useSSL: true, region: <region>.
#   - kx / self-contained: point at an S3 bucket, or `helm install` a standalone
#     S3 store (e.g. the official MinIO or a SeaweedFS chart) and point endpoint here.
# accessKey/secretKey land in the portal Secret — for production prefer a sealed
# secret / external-secrets over plaintext values here.
objectStore:
  endpoint: ""              # e.g. s3.us-west-2.amazonaws.com  (required)
  bucket: portal
  region: us-east-1
  useSSL: true
  accessKey: ""             # S3 access key id
  secretKey: ""             # S3 secret access key

# -- Ingress
ingress:
  enabled: false
  className: nginx
  hosts:
    - host: portal.local
      paths:
        - path: /
          pathType: Prefix
  # tls:
  #   - secretName: portal-tls
  #     hosts:
  #       - portal.example.com

# -- Resource limits
resources:
  server:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  worker:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  web:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# -- Per-process extra env, appended to the configmap + secret the chart already
# wires. extraEnvFrom pulls Secret/ConfigMap refs; extraEnv adds inline
# name/value (or valueFrom) entries. Main use: AWS credentials for the worker on a
# non-IRSA hub like kx — create a Secret with AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
# / AWS_REGION and reference it here so the worker can mint EKS tokens (survives
# helm upgrade, unlike `kubectl set env`). On a real hub use serviceAccount.roleArn
# (IRSA) instead and leave these empty.
server:
  extraEnv: []
  extraEnvFrom: []
worker:
  extraEnv: []
  extraEnvFrom: []
  # extraEnvFrom:
  #   - secretRef:
  #       name: portal-aws

# -- ArgoCD cluster-registry sync (read path). When enabled, the worker
# discovers clusters from ArgoCD's cluster Secrets (no manual portal
# registration) and the chart creates the RBAC it needs: read Secrets in
# `namespace`, and watch Platform/Tenant CRs cluster-wide. Point orgID/
# accountID/createdBy at existing portal IDs. Requires the worker to run
# in-cluster.
argocdSync:
  enabled: false
  namespace: argocd
  syncInterval: "120s"
  orgID: ""
  accountID: ""
  createdBy: ""

# -- GitOps write paths. The worker commits rendered manifests (tenant charts,
# cluster CRs) to these repos over SSH. Set sshKey to a deploy key with write
# access to the repos; setting a repo URL enables that vend path. The key is
# mounted read-only on the worker and never exposed as an env var.
gitops:
  sshKey: ""                 # private deploy key (PEM); enables the SSH git remote
  authorName: "portal"
  authorEmail: "portal@local"
  clustersRepoURL: ""        # e.g. git@github.com:nanohype/clusters.git — enables cluster vend
  clustersRepoRef: "main"
  tenantsRepoURL: ""         # e.g. git@github.com:nanohype/tenants.git — enables tenant vend
  tenantsRepoRef: "main"

# -- The hub's Crossplane role ARN (eks-fleet-crossplane). On a CROSS-ACCOUNT vend
# (the Cluster sets vendRoleArn), portal stamps this onto spec.bootstrapAccessRoleArn
# so cluster-stack grants the hub a cluster-admin EKS access entry and the bootstrap
# Workspace's get-token can reach the spoke API. Empty = same-account vends only.
fleet:
  hubRoleArn: ""             # e.g. arn:aws:iam::111111111111:role/eks-fleet-crossplane

# -- Cluster provision watch-back (the vend loop's closing leg). When enabled,
# the worker — running in-cluster on the hub — polls each committed provision
# op's eks-fleet Cluster XR and auto-registers the cluster (as eks_iam) once its
# endpoint+CA are up. Enabling it grants the worker read RBAC on
# fleet.nanohype.dev/clusters. Inert off the hub (no in-cluster config).
clusterWatchback:
  enabled: false
  interval: "60s"

# -- Cluster health watcher. When enabled (in-cluster, on the hub) the worker
# reads each registered cluster's per-cluster ArgoCD Application
# (cluster-<env>-<name>, in argocdSync.namespace) for sync/health, and — for
# eks_iam clusters with serviceAccount.roleArn set — its EKS control plane via
# eks:DescribeCluster, projecting both onto the cluster row. Grants the worker
# read RBAC on argoproj.io/applications in argocdSync.namespace. The EKS read
# degrades gracefully (empty) until the assume-role grants eks:DescribeCluster.
clusterHealth:
  enabled: false
  interval: "120s"

# -- Worker ServiceAccount IRSA. Set roleArn to an IAM role bound to the cluster's
# EKS OIDC provider to give the worker AWS credentials for read-only cluster
# status (e.g. eks:DescribeCluster, for the live cluster-detail view). Empty = no
# IRSA; the worker does Kubernetes reads only (the vend timeline needs none).
serviceAccount:
  roleArn: ""               # e.g. arn:aws:iam::111111111111:role/portal-worker
