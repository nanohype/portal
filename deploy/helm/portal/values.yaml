# -- Replica counts for each component
replicaCount:
  server: 1
  worker: 1   # Only 1 worker recommended — River handles concurrency internally
  web: 1

# -- Container images
image:
  server:
    repository: portal/server
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: portal/worker
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: portal/web
    tag: latest
    pullPolicy: IfNotPresent
  migrate:
    repository: portal/migrate
    tag: latest
    pullPolicy: IfNotPresent

# -- Application configuration
# Secrets (jwtSecret, encryptionKey, githubClientSecret, webhookSecret, S3 creds)
# are stored in a Kubernetes Secret. Everything else goes in a ConfigMap.
config:
  # Server
  serverAddr: ":8080"
  serverBaseURL: "http://localhost:8080"      # Public URL — set to your domain in production
  webURL: "http://localhost:5173"             # Frontend URL — set to your domain in production
  environment: "development"                  # "development" | "staging" | "production"
  logLevel: "info"                            # "debug" | "info" | "warn" | "error"
  shutdownTimeout: "15s"

  # Auth — create a GitHub OAuth App and set these
  githubClientID: ""
  githubClientSecret: ""

  # Security — MUST change these in production
  jwtSecret: "dev-secret-change-in-production"
  jwtExpiration: "24h"
  encryptionKey: "dev-encryption-key-32bytes!!!!!!"  # Must be exactly 32 bytes
  webhookSecret: ""                                   # HMAC secret for GitHub webhooks

  # Executor — "local" runs tofu on the worker host, "kubernetes" uses ephemeral pods
  executorType: "local"
  executorNamespace: "portal"                  # K8s namespace for executor pods
  executorImage: "portal-executor:tofu-1.11"   # Default executor image

  # Worker
  workerConcurrency: "10"
  workerHealthAddr: ":8081"

  # S3 — region only, creds come from the minio subchart values below
  s3Region: "us-east-1"

  # Database tuning
  dbMaxConns: "25"
  dbMinConns: "5"

# -- PostgreSQL subchart (Bitnami)
postgresql:
  enabled: true
  auth:
    username: portal
    password: portal          # Change in production
    database: portal
  primary:
    persistence:
      size: 1Gi

# -- Redis subchart (Bitnami)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 256Mi

# -- MinIO subchart (Bitnami)
minio:
  enabled: true
  auth:
    rootUser: minioadmin      # Change in production
    rootPassword: minioadmin  # Change in production
  defaultBuckets: portal
  persistence:
    size: 1Gi

# -- Ingress
ingress:
  enabled: false
  className: nginx
  hosts:
    - host: portal.local
      paths:
        - path: /
          pathType: Prefix
  # tls:
  #   - secretName: portal-tls
  #     hosts:
  #       - portal.example.com

# -- Resource limits
resources:
  server:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  worker:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  web:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# -- ArgoCD cluster-registry sync (read path). When enabled, the worker
# discovers clusters from ArgoCD's cluster Secrets (no manual portal
# registration) and the chart creates the RBAC it needs: read Secrets in
# `namespace`, and watch Platform/Tenant CRs cluster-wide. Point orgID/
# accountID/createdBy at existing portal IDs. Requires the worker to run
# in-cluster.
argocdSync:
  enabled: false
  namespace: argocd
  syncInterval: "120s"
  orgID: ""
  accountID: ""
  createdBy: ""

# -- GitOps write paths. The worker commits rendered manifests (tenant charts,
# cluster CRs) to these repos over SSH. Set sshKey to a deploy key with write
# access to the repos; setting a repo URL enables that vend path. The key is
# mounted read-only on the worker and never exposed as an env var.
gitops:
  sshKey: ""                 # private deploy key (PEM); enables the SSH git remote
  authorName: "portal"
  authorEmail: "portal@local"
  clustersRepoURL: ""        # e.g. git@github.com:nanohype/clusters.git — enables cluster vend
  clustersRepoRef: "main"
  tenantsRepoURL: ""         # e.g. git@github.com:nanohype/tenants.git — enables tenant vend
  tenantsRepoRef: "main"

# -- Cluster provision watch-back (the vend loop's closing leg). When enabled,
# the worker — running in-cluster on the hub — polls each committed provision
# op's eks-fleet Cluster XR and auto-registers the cluster (as eks_iam) once its
# endpoint+CA are up. Enabling it grants the worker read RBAC on
# fleet.nanohype.dev/clusters. Inert off the hub (no in-cluster config).
clusterWatchback:
  enabled: false
  interval: "60s"
