version: "3"

vars:
  DATABASE_URL: "postgres://portal:portal@localhost:5432/portal?sslmode=disable"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # === Development ===

  dev:
    desc: Run all services for local development (migrates first, then starts all)
    cmds:
      - task: db:migrate
      - task: dev:run

  dev:run:
    desc: Start server, worker, and web in parallel
    deps: [dev:server, dev:worker, dev:web]

  dev:server:
    desc: Run API server with hot reload
    env:
      DATABASE_URL: "{{.DATABASE_URL}}"
    cmds:
      - go run ./cmd/server

  dev:worker:
    desc: Run worker with hot reload
    env:
      DATABASE_URL: "{{.DATABASE_URL}}"
    cmds:
      - go run ./cmd/worker

  dev:web:
    desc: Run Vite dev server
    dir: web
    cmds:
      - npm run dev

  seed:
    desc: |
      Seed a fresh dev instance: AWS org vars + 4 landing-zone leaf
      workspaces (network → cluster → cluster-bootstrap → cluster-addons)
      + an `eks-gitops-prereqs` pipeline. Idempotent.
      Configure via env: LANDING_ZONE_PATH, LZ_ACCOUNT, LZ_REGION, LZ_ENV,
      AWS_PROFILE_NAME, TOFU_VERSION, PORTAL_API.
    cmds:
      - ./scripts/seed.sh

  seed:reupload:
    desc: |
      Re-pack the landing-zone tree and upload it over the existing
      lz-* workspaces' archives. Useful after editing the landing-zone
      repo without doing a full DB reset.
    cmds:
      - REUPLOAD=true ./scripts/seed.sh

  seed:demo:
    desc: |
      Reset the database and populate a full demo dataset across every
      surface (accounts, clusters with live status, tenants, vend orders
      with phase timelines, workspaces + runs + state, pipelines, templates,
      operations, org vars, teams, users, audit). Scoped to the "default" org
      the Dev Login lands on. WIPES all data first; dev-only. Run on a migrated
      DB, then `task dev` and click Dev Login.
    env:
      DATABASE_URL: "{{.DATABASE_URL}}"
    cmds:
      - go run ./cmd/seeddemo

  # === Database ===

  db:up:
    desc: Start PostgreSQL (Docker)
    cmds:
      - docker run -d --name portal-postgres -p 5432:5432 -e POSTGRES_USER=portal -e POSTGRES_PASSWORD=portal -e POSTGRES_DB=portal postgres:16-alpine 2>/dev/null || docker start portal-postgres

  db:down:
    desc: Stop PostgreSQL
    cmds:
      - docker stop portal-postgres

  db:migrate:
    desc: Run database migrations
    env:
      DATABASE_URL: "{{.DATABASE_URL}}"
    cmds:
      - go run ./cmd/migrate -direction up

  db:migrate:down:
    desc: Rollback last migration
    env:
      DATABASE_URL: "{{.DATABASE_URL}}"
    cmds:
      - go run ./cmd/migrate -direction down -steps 1

  db:reset:
    desc: Reset database (drop and recreate)
    cmds:
      - docker exec portal-postgres psql -U portal -c "DROP DATABASE IF EXISTS portal; CREATE DATABASE portal;"
      - task: db:migrate

  # === Redis ===

  redis:up:
    desc: Start Redis (Docker)
    cmds:
      - docker run -d --name portal-redis -p 6379:6379 redis:7-alpine 2>/dev/null || docker start portal-redis

  # === MinIO ===

  minio:up:
    desc: Start MinIO (Docker)
    cmds:
      - docker run -d --name portal-minio -p 9000:9000 -p 9001:9001 -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin minio/minio server /data --console-address ":9001" 2>/dev/null || docker start portal-minio

  # === Infrastructure ===

  infra:up:
    desc: Start all infrastructure (Postgres, Redis, MinIO)
    cmds:
      - task: db:up
      - task: redis:up
      - task: minio:up

  infra:down:
    desc: Stop all infrastructure
    cmds:
      - docker stop portal-postgres portal-redis portal-minio 2>/dev/null || true

  # === Code Generation ===

  generate:
    desc: Run all code generation
    cmds:
      - task: generate:sqlc
      - task: generate:openapi

  generate:sqlc:
    desc: Generate Go code from SQL queries
    cmds:
      - sqlc generate

  generate:openapi:
    desc: Generate TypeScript types from OpenAPI spec
    dir: web
    cmds:
      - npx openapi-typescript ../api/openapi/v1.yaml -o src/api/generated.ts

  # === Build ===

  build:
    desc: Build all binaries
    cmds:
      - go build ./cmd/server
      - go build ./cmd/worker
      - go build ./cmd/migrate

  build:web:
    desc: Build frontend for production
    dir: web
    cmds:
      - npm run build

  # === Docker ===

  docker:build:
    desc: Build all Docker images
    cmds:
      - docker build -f docker/Dockerfile.server -t portal/server:latest .
      - docker build -f docker/Dockerfile.worker -t portal/worker:latest .
      - docker build -f docker/Dockerfile.web -t portal/web:latest .
      - docker build -f docker/Dockerfile.migrate -t portal/migrate:latest .

  # === Helm ===

  helm:install:
    desc: Install Helm chart on local cluster
    cmds:
      - helm install portal deploy/helm/portal

  helm:upgrade:
    desc: Upgrade Helm chart
    cmds:
      - helm upgrade portal deploy/helm/portal

  helm:uninstall:
    desc: Uninstall Helm chart
    cmds:
      - helm uninstall portal

  hub:install:
    desc: |
      Install/upgrade portal on a real EKS hub with the production options baked in
      — IRSA, the external S3 objectStore, the in-cluster watchers, the gitops
      remote. Pass the per-hub bits; the structural options are set for you.
      The hand-rolled IAM (portal-hub / portal-spoke tofu) + the validation steps
      are in docs/deploy-on-hub.md.

      Required: ROLE_ARN (the portal-hub IRSA role ARN), STATE_BUCKET (the portal
        state bucket), REGION.
      Optional: CLUSTERS_REPO_URL + SSH_KEY_PATH (clusters-repo write deploy key),
        RELEASE (portal), NAMESPACE (default), ENVIRONMENT (development — dev-login,
        for validation; production needs real secrets, pass them via EXTRA_ARGS),
        EXTRA_ARGS (passed straight to helm — images, secrets, -f a values file).
    requires:
      vars: [ROLE_ARN, STATE_BUCKET, REGION]
    vars:
      RELEASE: '{{.RELEASE | default "portal"}}'
      NAMESPACE: '{{.NAMESPACE | default "default"}}'
      ENVIRONMENT: '{{.ENVIRONMENT | default "development"}}'
    cmds:
      - helm dependency build deploy/helm/portal
      - >-
        helm upgrade --install {{.RELEASE}} deploy/helm/portal
        --namespace {{.NAMESPACE}} --create-namespace
        --set config.environment={{.ENVIRONMENT}}
        --set serviceAccount.roleArn={{.ROLE_ARN}}
        --set objectStore.endpoint=s3.{{.REGION}}.amazonaws.com
        --set objectStore.bucket={{.STATE_BUCKET}}
        --set objectStore.region={{.REGION}}
        --set objectStore.useSSL=true
        --set clusterWatchback.enabled=true
        --set clusterHealth.enabled=true
        {{if .CLUSTERS_REPO_URL}}--set gitops.clustersRepoURL={{.CLUSTERS_REPO_URL}}{{end}}
        {{if .SSH_KEY_PATH}}--set-file gitops.sshKey={{.SSH_KEY_PATH}}{{end}}
        {{.EXTRA_ARGS}}

  # === Quality ===

  lint:
    desc: Run linters
    cmds:
      - go vet ./...
      - cd web && npx tsc --noEmit

  test:
    desc: Run tests
    cmds:
      - go test ./...

  fmt:
    desc: Format code
    cmds:
      - gofmt -w .

  # === Upload Helpers ===

  tar:
    desc: "Create a .tar.gz from a directory (usage: task tar -- /path/to/tf/dir)"
    cmds:
      - |
        DIR="{{.CLI_ARGS}}"
        if [ -z "$DIR" ]; then echo "Usage: task tar -- /path/to/tf/dir"; exit 1; fi
        if [ ! -d "$DIR" ]; then echo "Error: $DIR is not a directory"; exit 1; fi
        NAME=$(basename "$DIR")
        tar czf "${NAME}.tar.gz" -C "$DIR" .
        echo "Created ${NAME}.tar.gz ($(du -h "${NAME}.tar.gz" | cut -f1))"

  upload:
    desc: "Tar a directory and upload to a workspace (usage: task upload -- /path/to/tf/dir WORKSPACE_ID)"
    cmds:
      - |
        ARGS=({{.CLI_ARGS}})
        DIR="${ARGS[0]}"
        WS_ID="${ARGS[1]}"
        if [ -z "$DIR" ] || [ -z "$WS_ID" ]; then echo "Usage: task upload -- /path/to/tf/dir WORKSPACE_ID"; exit 1; fi
        if [ ! -d "$DIR" ]; then echo "Error: $DIR is not a directory"; exit 1; fi
        TMPFILE=$(mktemp /tmp/portal-upload-XXXXXX.tar.gz)
        tar czf "$TMPFILE" -C "$DIR" .
        echo "Uploading $(du -h "$TMPFILE" | cut -f1) to workspace $WS_ID..."
        TOKEN=$(curl -s http://localhost:8080/api/v1/auth/dev -o /dev/null -w '%{redirect_url}' | grep -o 'token=[^&]*' | cut -d= -f2)
        curl -s -X POST "http://localhost:8080/api/v1/workspaces/${WS_ID}/upload" \
          -H "Authorization: Bearer $TOKEN" \
          -F "file=@${TMPFILE}" | python3 -m json.tool 2>/dev/null || echo "(upload response above)"
        rm -f "$TMPFILE"

  # === Setup ===

  setup:
    desc: Initial project setup
    cmds:
      - go mod download
      - cd web && npm install
      - task: infra:up
      - echo "Waiting for Postgres to start..."
      - sleep 3
      - task: db:migrate
      - echo "Setup complete! Run 'task dev' to start development."
