name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: portal
          POSTGRES_PASSWORD: portal
          POSTGRES_DB: portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Fail the build on unformatted Go so formatting drift can't land on main.
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "unformatted Go files:"; gofmt -l .; exit 1; }
      - run: go build ./...
      - run: go vet ./...
      # Fail the build on a known CVE in a Go dependency or the stdlib — the
      # supply-chain gate that catches what Dependabot would only flag later.
      # Pinned scanner version; CVE data is still fetched live from vuln.go.dev.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...
      # TEST_DATABASE_URL points the repository integration tests at the service
      # Postgres; without it they skip (so `go test` still works with no DB).
      - run: go test ./...
        env:
          TEST_DATABASE_URL: postgres://portal:portal@localhost:5432/postgres?sslmode=disable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      # Fail the build on a high/critical CVE in an npm dependency (the class
      # that produced the vite Dependabot alerts).
      - run: npm audit --audit-level=high
        working-directory: web
      - run: npm run lint
        working-directory: web
      # tsc -b is the real typecheck — the root tsconfig has files:[] + project
      # references, so `tsc --noEmit` against it checks nothing.
      - run: npx tsc -b
        working-directory: web
      - run: npx vite build
        working-directory: web

  chart:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl -sSfL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - name: Helm lint
        run: helm lint deploy/helm/portal

      # The chart deliberately requires database.url (no bundled DB — point it at
      # a managed Postgres), so render with a dummy URL purely to exercise
      # templating in CI.
      - name: Helm template
        run: |
          mkdir -p rendered
          helm template portal deploy/helm/portal \
            --set 'database.url=postgres://portal:portal@db.example.com:5432/portal?sslmode=require' \
            > rendered/portal.yaml

      - name: Validate against Kubernetes schemas
        run: kubeconform -strict -ignore-missing-schemas -summary rendered/portal.yaml

      # Source files are gated elsewhere; this asserts the RENDERED chart too —
      # a zero account id, placeholder token, or account-less ARN that only
      # appears after templating.
      - name: Assert no unfilled sentinels in rendered output
        uses: nanohype/nanohype/.github/actions/render-assert@main
        with:
          manifests: rendered
