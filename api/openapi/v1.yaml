    Account:
      type: object
      required: [id, org_id, name, aws_account_id, assume_role_arn, default_region, created_by, created_at, updated_at, external_id_set]
      properties:
        id:
          type: string
        org_id:
          type: string
        name:
          type: string
        description:
          type: string
        aws_account_id:
          type: string
          description: 12-digit AWS account number
        assume_role_arn:
          type: string
          description: ARN of the IAM role portal assumes into in this account
        external_id_set:
          type: boolean
          description: Whether an external ID is configured for the assume-role trust
        default_region:
          type: string
          description: Default AWS region for resources in this account
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AccountList:
      type: object
      required: [data, total, page, per_page]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Account"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    CreateAccountRequest:
      type: object
      required: [name, aws_account_id, assume_role_arn, default_region]
      properties:
        name:
          type: string
          description: Display name (unique within org)
        description:
          type: string
        aws_account_id:
          type: string
          pattern: "^[0-9]{12}$"
        assume_role_arn:
          type: string
          description: IAM role ARN; the account portion must match aws_account_id
        external_id:
          type: string
          description: Optional shared secret for the assume-role trust policy
        default_region:
          type: string
          pattern: "^[a-z]{2}-[a-z]+-[0-9]$"

    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        assume_role_arn:
          type: string
        external_id:
          type: string
        default_region:
          type: string

    Cluster:
      type: object
      required: [id, org_id, account_id, name, api_endpoint, region, connection_status, node_count, k8s_version, created_by, created_at, updated_at, credentials_set]
      properties:
        id: { type: string }
        org_id: { type: string }
        account_id: { type: string }
        name: { type: string }
        description: { type: string }
        environment:
          type: string
          enum: [development, staging, production]
        api_endpoint: { type: string }
        region: { type: string }
        connection_status:
          type: string
          enum: [pending, connecting, connected, failed]
        last_connected_at:
          type: string
          format: date-time
          nullable: true
        connection_error: { type: string }
        node_count: { type: integer }
        k8s_version: { type: string }
        credentials_set: { type: boolean }
        created_by: { type: string }
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ClusterList:
      type: object
      required: [data, total, page, per_page]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Cluster"
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }

    CreateClusterRequest:
      type: object
      required: [account_id, name, api_endpoint, ca_bundle, sa_token]
      properties:
        account_id:
          type: string
          description: Parent account (portal-internal ULID)
        name: { type: string }
        description: { type: string }
        environment:
          type: string
          enum: [development, staging, production]
        api_endpoint:
          type: string
          description: Must be an https:// URL
        ca_bundle:
          type: string
          description: PEM-encoded CA certificate
        sa_token:
          type: string
          description: Service-account bearer token
        region:
          type: string
          description: Defaults to the parent account's default region when omitted

    UpdateClusterRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        environment: { type: string }
        api_endpoint: { type: string }
        ca_bundle: { type: string }
        sa_token: { type: string }
        region: { type: string }

    ClusterOrderInput:
      type: object
      required: [name, account, region, team]
      description: |
        The vend spec. Portal templates an eks-fleet Cluster CR from it. account
        is the 12-digit AWS account number (resolved server-side to the portal
        account that carries the assume-role). Optional fields fall back to the
        fleet defaults.
      properties:
        name:
          type: string
          description: Cluster name (also the CR name); k8s-name shaped
        account:
          type: string
          pattern: "^[0-9]{12}$"
        region:
          type: string
          pattern: "^[a-z]{2}-[a-z]+-[0-9]$"
        team:
          type: string
          description: Owning team; becomes the CR namespace
        environment:
          type: string
          enum: [dev, staging, production]
        cluster_version:
          type: string
          description: EKS version; defaults to the fleet default
        endpoint_public_access:
          type: boolean

    ClusterOperation:
      type: object
      required: [id, org_id, name, environment, team, operation, status, git_commit_sha, error, spec_json, created_by, created_at]
      description: A row in the cluster vend order-desk log.
      properties:
        id: { type: string }
        org_id: { type: string }
        name: { type: string }
        environment: { type: string }
        team: { type: string }
        operation:
          type: string
          enum: [provision, deprovision]
        status:
          type: string
          enum: [pending, committed, failed, active, deprovisioned]
          description: >
            Coarse portal-side lifecycle. provision: pending → committed → active.
            deprovision: pending → committed → deprovisioned. failed is the terminal
            commit failure for either. Finer substrate progress lives in vend_phases.
        git_commit_sha: { type: string }
        error: { type: string }
        spec_json:
          type: object
          additionalProperties: true
        cluster_id:
          type: string
          nullable: true
          description: Set when the watch-back auto-registers the vended cluster
        created_by: { type: string }
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        vend_phases:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/VendPhaseEntry"
          description: >
            Regressible map keyed by phase projecting the substrate's journey onto
            the order — provision (committed, tofu_running, active) and deprovision
            (committed, deprovisioning, deprovisioned). A phase's detail carries the
            current tofu error while running/destroying; it clears as the substrate
            recovers (the provider retries), so it is not a terminal failure.

    VendPhaseEntry:
      type: object
      required: [at]
      properties:
        at:
          type: string
          format: date-time
        detail:
          type: string

    ClusterOperationList:
      type: object
      required: [items, total, page, per_page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ClusterOperation"
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }

    Tenant:
      type: object
      required: [id, org_id, cluster_id, name, phase, spec, status, last_observed_at, created_at, updated_at]
      properties:
        id: { type: string }
        org_id: { type: string }
        cluster_id: { type: string }
        name: { type: string }
        phase:
          type: string
          description: Denormalized from .status.phase for fast filtering; "" when unknown
        spec:
          type: object
          additionalProperties: true
          description: Full Tenant .spec, as observed
        status:
          type: object
          additionalProperties: true
          description: Full Tenant .status, as observed
        last_observed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TenantList:
      type: object
      required: [data, total, page, per_page]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }

    CreateTenantRequest:
      type: object
      required: [cluster_id, name]
      properties:
        cluster_id:
          type: string
        name:
          type: string
          description: RFC 1123 name (lowercase alphanumeric + hyphen, 1-63)
        values:
          type: object
          additionalProperties: true
          description: |
            When `template_id` is empty: full helm values blob passed to the
            eks-agent-platform tenant chart. When `template_id` is set: operator overrides,
            applied to the template's defaults subject to its allowed_overrides
            allowlist + caps.
        template_id:
          type: string
          description: Optional reference to a curated template
        owning_team_id:
          type: string
          description: |
            Team that owns the new tenant. Required for non-admins in more
            than one team; auto-resolved when the user is in exactly one
            team; optional for admins (omitting means admin-only visibility).

    TenantTeamAccess:
      type: object
      required: [id, org_id, cluster_id, tenant_name, team_id, granted_by, granted_at]
      properties:
        id: { type: string }
        org_id: { type: string }
        cluster_id: { type: string }
        tenant_name: { type: string }
        team_id: { type: string }
        granted_by: { type: string }
        granted_at:
          type: string
          format: date-time

    TemplateTeamAccess:
      type: object
      required: [id, org_id, template_id, team_id, granted_by, granted_at]
      properties:
        id: { type: string }
        org_id: { type: string }
        template_id: { type: string }
        team_id: { type: string }
        granted_by: { type: string }
        granted_at:
          type: string
          format: date-time

    Template:
      type: object
      required: [id, org_id, name, persona, default_values, allowed_overrides, max_budget_usd, allowed_model_families, required_compliance, created_by, created_at, updated_at]
      properties:
        id: { type: string }
        org_id: { type: string }
        name: { type: string }
        description: { type: string }
        persona: { type: string }
        default_values:
          type: object
          additionalProperties: true
        allowed_overrides:
          type: array
          items: { type: string }
          description: Dotted paths the operator can override at instantiation
        max_budget_usd:
          type: integer
          description: 0 = no cap
        allowed_model_families:
          type: array
          items: { type: string }
        required_compliance:
          type: array
          items: { type: string }
          description: Compliance flags that must be set true (e.g. ["soc2"])
        created_by: { type: string }
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTemplateRequest:
      type: object
      required: [name, persona]
      properties:
        name: { type: string }
        description: { type: string }
        persona: { type: string }
        default_values:
          type: object
          additionalProperties: true
        allowed_overrides:
          type: array
          items: { type: string }
        max_budget_usd: { type: integer }
        allowed_model_families:
          type: array
          items: { type: string }
        required_compliance:
          type: array
          items: { type: string }

    UpdateTemplateRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        persona: { type: string }
        default_values:
          type: object
          additionalProperties: true
        allowed_overrides:
          type: array
          items: { type: string }
        max_budget_usd: { type: integer }
        allowed_model_families:
          type: array
          items: { type: string }
        required_compliance:
          type: array
          items: { type: string }

    TenantOperation:
      type: object
      required: [id, org_id, cluster_id, tenant_name, operation, status, created_by, created_at]
      properties:
        id: { type: string }
        org_id: { type: string }
        cluster_id: { type: string }
        tenant_name: { type: string }
        operation:
          type: string
          enum: [create, delete]
        status:
          type: string
          enum: [pending, committed, failed]
        git_commit_sha: { type: string }
        error: { type: string }
        values_json:
          type: object
          additionalProperties: true
        template_id:
          type: string
          nullable: true
        created_by: { type: string }
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    OpsFeedItem:
      type: object
      required: [kind, at]
      description: >
        One entry in the org-wide operations feed. Exactly one of cluster/tenant
        is set, discriminated by kind. `at` is the activity time the feed sorts
        on (completion if finished, else creation).
      properties:
        kind:
          type: string
          enum: [cluster, tenant]
        at:
          type: string
          format: date-time
        cluster:
          $ref: "#/components/schemas/ClusterOperation"
        tenant:
          $ref: "#/components/schemas/TenantOperation"
