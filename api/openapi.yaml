    get:
      operationId: revealWorkspaceVariableValue
      summary: Reveal a workspace variable's decrypted value (admin)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: variableId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Decrypted value
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VariableValue" }
        default: { $ref: "#/components/responses/Error" }

