      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source_workspace_id: { type: string }
              required: [source_workspace_id]
      responses:
        "201":
          description: Copied variables
