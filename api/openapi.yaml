openapi: 3.1.0
info:
  title: portal API
  version: 1.0.0
  description: |
    The portal HTTP API. Every route chi serves under /api/v1
    (internal/server/server.go) is described here; the schemas mirror the
    handler-layer *Response types in internal/handler (the wire boundary —
    repository rows never serialize directly).

    web/src/api/types.ts is generated from this file with openapi-typescript
    (`npm run generate:api` in web/); openapi-fetch consumes the generated
    `paths` interface. Edit this spec, regenerate, and the frontend contract
    follows — CI fails on drift.

    Two surfaces sit outside the JSON request/response model:
    - GET /workspaces/{workspaceId}/runs/{runId}/logs/ws upgrades to a
      WebSocket (documented on the operation; the stream itself is
      newline-delimited log text, authenticated via the
      `bearer` + token subprotocol pair).
    - GET /auth/github and /auth/github/callback are browser redirect hops of
      the OAuth flow, not XHR endpoints.

    Errors use one envelope everywhere (ErrorResponse) via respond.Error /
    respond.FromError; operations declare it as their default response.
servers:
  - url: /api/v1

paths:
  /health:
    get:
      operationId: getHealth
      summary: App-level health surface the UI reads
      description: >
        Per-service status plus the dev_login flag in development. Returns 503
        with the same body shape when degraded. (Liveness/readiness probes live
        at /healthz and /readyz outside /api/v1.)
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }
        "503":
          description: Degraded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/github:
    get:
      operationId: githubLogin
      summary: Start the GitHub OAuth flow (browser redirect)
      security: []
      responses:
        "307":
          description: Redirect to GitHub's authorize URL; sets the signed oauth_state cookie.
        default: { $ref: "#/components/responses/Error" }

  /auth/github/callback:
    get:
      operationId: githubCallback
      summary: GitHub OAuth callback (browser redirect)
      description: >
        Exchanges the code, provisions the user, sets the short-lived HttpOnly
        handoff cookie (scoped to /auth/handoff), and redirects to the SPA
        callback page, which completes login via POST /auth/handoff.
      security: []
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
      responses:
        "307":
          description: Redirect to the SPA /auth/callback page.
        default: { $ref: "#/components/responses/Error" }

  /auth/handoff:
    post:
      operationId: authHandoff
      summary: Exchange the HttpOnly login-handoff cookie for the JWT (one-time)
      description: >
        Completes the login handoff. The OAuth callback (and dev login) set a
        short-lived HttpOnly cookie scoped to this path; this endpoint returns
        the JWT once and expires the cookie in the same response
        (delete-on-read), so a second call gets 401. POST keeps the exchange
        non-cacheable, and SameSite=Lax blocks cross-site POSTs from carrying
        the cookie. Unauthenticated by design — the caller has no bearer token
        yet.
      security: []
      responses:
        "200":
          description: The JWT, exactly once; the handoff cookie is expired in the same response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                required: [token]
        "401":
          description: Missing, expired, or malformed handoff cookie
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        default: { $ref: "#/components/responses/Error" }

  /auth/me:
    get:
      operationId: getMe
      summary: The authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        default: { $ref: "#/components/responses/Error" }

  /webhooks/github:
    post:
      operationId: githubWebhook
      summary: GitHub push webhook (public, HMAC-verified)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: GitHub webhook payload (ping or push event).
      responses:
        "200":
          description: Webhook handled (pong / ignored / runs triggered).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  status: { type: string }
                  triggered: { type: integer }
                required: [status]
        default: { $ref: "#/components/responses/Error" }

  /users:
    get:
      operationId: listUsers
      summary: List org users (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserList" }
        default: { $ref: "#/components/responses/Error" }

  /users/{userId}/role:
    put:
      operationId: updateUserRole
      summary: Change a user's role (owner)
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRoleRequest" }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        default: { $ref: "#/components/responses/Error" }

  /audit-logs:
    get:
      operationId: listAuditLogs
      summary: List audit logs (admin)
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditLogList" }
        default: { $ref: "#/components/responses/Error" }

  /variables:
    get:
      operationId: listOrgVariables
      summary: List org variables
      responses:
        "200":
          description: Org variables (sensitive values redacted)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgVariableList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createOrgVariable
      summary: Create an org variable (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVariableRequest" }
      responses:
        "201":
          description: Created variable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgVariable" }
        default: { $ref: "#/components/responses/Error" }

  /variables/{variableId}:
    put:
      operationId: updateOrgVariable
      summary: Update an org variable (admin)
      parameters:
        - { name: variableId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVariableRequest" }
      responses:
        "200":
          description: Updated variable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgVariable" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteOrgVariable
      summary: Delete an org variable (admin)
      parameters:
        - { name: variableId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Error" }

  /variables/{variableId}/value:
    get:
      operationId: revealOrgVariableValue
      summary: Reveal an org variable's decrypted value (admin)
      parameters:
        - { name: variableId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Decrypted value
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VariableValue" }
        default: { $ref: "#/components/responses/Error" }

  /teams:
    get:
      operationId: listTeams
      summary: List teams
      parameters:
        - name: member_of
          in: query
          description: "`me` scopes the result to teams the caller belongs to."
          schema: { type: string, enum: [me] }
      responses:
        "200":
          description: Teams
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createTeam
      summary: Create a team (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [name]
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Team" }
        default: { $ref: "#/components/responses/Error" }

  /teams/{teamId}:
    get:
      operationId: getTeam
      summary: Get a team
      parameters:
        - { name: teamId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Team" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteTeam
      summary: Delete a team (admin)
      parameters:
        - { name: teamId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Error" }

  /teams/{teamId}/members:
    get:
      operationId: listTeamMembers
      summary: List team members
      parameters:
        - { name: teamId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamMemberList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: addTeamMember
      summary: Add a team member (admin)
      parameters:
        - { name: teamId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: string }
                role: { type: string }
                cloud_identity: { type: string }
              required: [user_id, role]
      responses:
        "201":
          description: Added member
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamMember" }
        default: { $ref: "#/components/responses/Error" }

  /teams/{teamId}/members/{userId}:
    put:
      operationId: updateTeamMember
      summary: Update a team member (admin)
      parameters:
        - { name: teamId, in: path, required: true, schema: { type: string } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string }
                cloud_identity: { type: string }
              required: [role]
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TeamMember" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: removeTeamMember
      summary: Remove a team member (admin)
      parameters:
        - { name: teamId, in: path, required: true, schema: { type: string } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
        default: { $ref: "#/components/responses/Error" }

  /accounts:
    get:
      operationId: listAccounts
      summary: List AWS accounts (admin)
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createAccount
      summary: Register an AWS account (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAccountRequest" }
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        default: { $ref: "#/components/responses/Error" }

  /accounts/{accountId}:
    get:
      operationId: getAccount
      summary: Get an account (admin)
      parameters:
        - { name: accountId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: updateAccount
      summary: Update an account (admin)
      parameters:
        - { name: accountId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAccountRequest" }
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteAccount
      summary: Delete an account (admin)
      parameters:
        - { name: accountId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Error" }

  /clusters:
    get:
      operationId: listClusters
      summary: List clusters
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer } }
        - { name: account_id, in: query, schema: { type: string } }
      responses:
        "200":
          description: Clusters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClusterList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createCluster
      summary: Register a cluster (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateClusterRequest" }
      responses:
        "201":
          description: Created cluster
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
        default: { $ref: "#/components/responses/Error" }

  /clusters/{clusterId}:
    get:
      operationId: getCluster
      summary: Get a cluster
      parameters:
        - { name: clusterId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Cluster
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: updateCluster
      summary: Update a cluster (admin)
      parameters:
        - { name: clusterId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateClusterRequest" }
      responses:
        "200":
          description: Updated cluster
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cluster" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteCluster
      summary: Delete a cluster (admin)
      parameters:
        - { name: clusterId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Error" }

  /clusters/{clusterId}/test-connection:
    post:
      operationId: testClusterConnection
      summary: Re-run the async connection test (admin)
      parameters:
        - { name: clusterId, in: path, required: true, schema: { type: string } }
      responses:
        "202":
          description: Connection test enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
        default: { $ref: "#/components/responses/Error" }

  /cluster-orders:
    get:
      operationId: listClusterOrders
      summary: Recent cluster operations across the org (admin)
      responses:
        "200":
          description: Cluster operations, newest first
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClusterOperationList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: provisionCluster
      summary: Order a cluster vend (admin)
      description: >
        Templates an eks-fleet Cluster CR from the input and commits it to the
        clusters GitOps repo; the vended cluster auto-registers when it comes up.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClusterOrderInput" }
      responses:
        "202":
          description: Provision enqueued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClusterOperation" }
        default: { $ref: "#/components/responses/Error" }

  /cluster-orders/{environment}/{name}:
    delete:
      operationId: deprovisionCluster
      summary: Order a cluster teardown (admin)
      parameters:
        - { name: environment, in: path, required: true, schema: { type: string } }
        - { name: name, in: path, required: true, schema: { type: string } }
        - { name: team, in: query, required: true, schema: { type: string } }
      responses:
        "202":
          description: Deprovision enqueued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClusterOperation" }
        default: { $ref: "#/components/responses/Error" }

  /cluster-orders/{environment}/{name}/operations:
    get:
      operationId: listClusterOrderOperations
      summary: Vend log for one cluster, newest first (admin)
      parameters:
        - { name: environment, in: path, required: true, schema: { type: string } }
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Cluster operations
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClusterOperationList" }
        default: { $ref: "#/components/responses/Error" }

  /cluster-orders/{environment}/{name}/unwedge:
    post:
      operationId: unwedgeCluster
      summary: Break-glass teardown for a wedged spoke (owner)
      description: >
        Tears the spoke's tagged AWS resources down directly and drops the
        Workspace finalizers. No-op unless the Workspace is genuinely wedged
        and already marked for deletion.
      parameters:
        - { name: environment, in: path, required: true, schema: { type: string } }
        - { name: name, in: path, required: true, schema: { type: string } }
        - { name: team, in: query, required: true, schema: { type: string } }
      responses:
        "202":
          description: Unwedge enqueued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClusterOperation" }
        default: { $ref: "#/components/responses/Error" }

  /ops/feed:
    get:
      operationId: getOpsFeed
      summary: Org-wide operations feed (admin)
      description: Cluster vends and tenant deploys merged into one activity stream, newest first.
      responses:
        "200":
          description: Feed items
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsFeedItemList" }
        default: { $ref: "#/components/responses/Error" }

  /templates:
    get:
      operationId: listTemplates
      summary: List tenant templates
      responses:
        "200":
          description: Templates (team-filtered for non-admins)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createTemplate
      summary: Create a template (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTemplateRequest" }
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Template" }
        default: { $ref: "#/components/responses/Error" }

  /templates/{templateID}:
    get:
      operationId: getTemplate
      summary: Get a template
      parameters:
        - { name: templateID, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Template" }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: updateTemplate
      summary: Update a template (admin)
      parameters:
        - { name: templateID, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTemplateRequest" }
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Template" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteTemplate
      summary: Delete a template (admin)
      parameters:
        - { name: templateID, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Error" }

  /templates/{templateID}/access:
    get:
      operationId: listTemplateAccess
      summary: List team-access grants on a template
      parameters:
        - { name: templateID, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Grants
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateTeamAccessList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: grantTemplateAccess
      summary: Grant a team access to a template (admin)
      parameters:
        - { name: templateID, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                team_id: { type: string }
              required: [team_id]
      responses:
        "201":
          description: Grant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplateTeamAccess" }
        default: { $ref: "#/components/responses/Error" }

  /templates/{templateID}/access/{teamId}:
    delete:
      operationId: revokeTemplateAccess
      summary: Revoke a team's template access (admin)
      parameters:
        - { name: templateID, in: path, required: true, schema: { type: string } }
        - { name: teamId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Revoked }
        default: { $ref: "#/components/responses/Error" }

  /tenants:
    get:
      operationId: listTenants
      summary: List tenants (watcher-observed inventory)
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer } }
        - { name: cluster_id, in: query, schema: { type: string } }
      responses:
        "200":
          description: Tenants (team-filtered for non-admins)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createTenant
      summary: Request a tenant deploy (operator)
      description: >
        Enqueues a tenant_operation of kind=create; the tenant row appears once
        ArgoCD applies the commit and the watcher observes the CR.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTenantRequest" }
      responses:
        "202":
          description: Create enqueued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantOperation" }
        default: { $ref: "#/components/responses/Error" }

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      summary: Get a tenant
      parameters:
        - { name: tenantId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tenant" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteTenant
      summary: Request a tenant delete (operator)
      parameters:
        - { name: tenantId, in: path, required: true, schema: { type: string } }
      responses:
        "202":
          description: Delete enqueued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TenantOperation" }
        default: { $ref: "#/components/responses/Error" }

  /tenants/{tenantId}/operations:
    get:
