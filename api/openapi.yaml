    delete:
      operationId: deleteStateVersion
      summary: Drop one state version + its S3 objects (admin)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: serial, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted (row + storage) }
        "200":
          description: Row deleted, storage cleanup failed (detail attached)
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { $ref: "#/components/schemas/StateVersion" }
                  storage_error: { type: string }
                required: [deleted, storage_error]
        default: { $ref: "#/components/responses/Error" }

