          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspaceTeamAccess" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/access/{teamId}:
    delete:
      operationId: removeWorkspaceAccess
      summary: Revoke a team's workspace access (admin)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: teamId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Revoked }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/runs:
    get:
      operationId: listRuns
      summary: List a workspace's runs
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: per_page, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Runs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createRun
      summary: Create a run (role elevates per operation; apply/destroy on a workspace that requires approval needs admin)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRunRequest" }
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/runs/{runId}:
    get:
      operationId: getRun
      summary: Get a run
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: runId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/runs/{runId}/plan-json:
    get:
      operationId: getRunPlanJSON
      summary: The run's machine-readable plan
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: runId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: tofu show -json output
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TofuPlanJSON" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/runs/{runId}/logs/ws:
    get:
      operationId: streamRunLogs
      summary: Live run log stream (WebSocket upgrade)
      description: >
        Not a JSON operation: the connection upgrades to a WebSocket after the
        org-scope check. Clients authenticate by requesting the subprotocol
        pair ["bearer", <jwt>]; messages are text log lines. Documented here
        for completeness — the typed client does not call it.
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: runId, in: path, required: true, schema: { type: string } }
      responses:
        "101": { description: Switching to the WebSocket protocol. }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/runs/{runId}/cancel:
    post:
      operationId: cancelRun
      summary: Cancel a run (operator)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: runId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Cancelled run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/runs/{runId}/approvals:
    get:
      operationId: listApprovals
      summary: List a run's approvals
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: runId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Approvals
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createApproval
      summary: Approve or reject a gated apply
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: runId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApprovalRequest" }
      responses:
        "201":
          description: Recorded decision
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Approval" }
        default: { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Error:
      description: The standard error envelope (respond.Error / respond.FromError).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      properties:
        error: { type: string, description: "HTTP status text." }
        message: { type: string }
        request_id: { type: string, description: "Set on 5xx responses so logs can be correlated." }
      required: [error]

    HealthStatus:
      type: object
      properties:
        status: { type: string }
        services:
          type: object
          additionalProperties: { type: string }
        dev_login:
          type: boolean
          description: Present (true) only in development, where the dev-login route exists.
      required: [status]

    VariableValue:
      type: object
      properties:
        value: { type: string }
      required: [value]

    User:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        email: { type: string }
        name: { type: string }
        avatar_url: { type: string }
        github_id:
          type: [integer, "null"]
          description: GitHub account id for OAuth-provisioned users; null for dev users.
        role: { type: string, enum: [owner, admin, operator, viewer] }
        last_login_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, org_id, email, name, role, created_at, updated_at]

    UpdateRoleRequest:
      type: object
      properties:
        role: { type: string, enum: [owner, admin, operator, viewer] }
      required: [role]

    Workspace:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        name: { type: string }
        description: { type: string }
        source: { type: string, enum: [vcs, upload] }
        repo_url: { type: string }
        repo_branch: { type: string }
        working_dir: { type: string }
        tofu_version: { type: string }
        environment: { type: string, enum: [development, staging, production] }
        auto_apply: { type: boolean }
        requires_approval: { type: boolean }
        vcs_trigger_enabled: { type: boolean }
        locked: { type: boolean }
        locked_by: { type: [string, "null"] }
        current_run_id: { type: [string, "null"] }
        current_config_version_id: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        last_run_status: { type: [string, "null"], description: "List-view rollup." }
        last_run_at: { type: [string, "null"], format: date-time, description: "List-view rollup." }
        resource_count: { type: integer, description: "List-view rollup." }
        effective_role:
          type: string
          enum: [viewer, operator, admin, owner]
          description: >-
            The caller's role on this workspace: their org role, or a higher
            role one of their teams holds through a workspace team grant.
            Single-workspace reads only.
      required:
        [id, org_id, name, source, repo_url, repo_branch, working_dir,
         tofu_version, environment, auto_apply, requires_approval,
         vcs_trigger_enabled, locked, created_by, created_at, updated_at]

    CreateWorkspaceRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        source: { type: string, enum: [vcs, upload] }
        repo_url: { type: string }
        repo_branch: { type: string }
        working_dir:
          type: string
          description: >-
            Repo-relative path to the leaf portal runs in. Stored canonical:
            "./envs/production", "envs//production", "envs/./production" and
            "envs/production/" all name one directory to the executor, so they
            are all stored as "envs/production". Omit on update to keep the
            stored value.
        tofu_version: { type: string }
        environment: { type: string, enum: [development, staging, production] }
        auto_apply: { type: boolean }
        requires_approval: { type: boolean }
        vcs_trigger_enabled: { type: boolean }
      required: [name]

    UpdateWorkspaceRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        repo_url: { type: string }
        repo_branch: { type: string }
        working_dir:
          type: string
          description: >-
            Repo-relative path to the leaf portal runs in. Stored canonical:
            "./envs/production", "envs//production", "envs/./production" and
            "envs/production/" all name one directory to the executor, so they
            are all stored as "envs/production". Omit on update to keep the
            stored value.
        tofu_version: { type: string }
        environment: { type: string, enum: [development, staging, production] }
        auto_apply: { type: boolean }
        requires_approval: { type: boolean }
        vcs_trigger_enabled: { type: boolean }

    CloneWorkspaceRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        environment: { type: string }
        requires_approval:
          type: boolean
          description: >-
            Approval gate for the clone. Omit to inherit the source's. Raising
            it is an operator action — it is how a clone of a config another
            workspace already gates gets created without an admin. Clearing a
            gate the source holds needs admin.
      required: [name]

    RunStatus:
      type: string
      enum:
        - pending
        - queued
        - planning
        - planned
        - awaiting_approval
        - applying
        - applied
        - errored
        - cancelled
        - discarded

    RunOperation:
      type: string
      enum: [plan, apply, destroy, import, test]

    Run:
      type: object
      properties:
        id: { type: string }
        workspace_id: { type: string }
        org_id: { type: string }
        operation: { $ref: "#/components/schemas/RunOperation" }
        status: { $ref: "#/components/schemas/RunStatus" }
        plan_output: { type: string }
        plan_log_url: { type: string }
        apply_log_url: { type: string }
        resources_added: { type: integer }
        resources_changed: { type: integer }
        resources_deleted: { type: integer }
        error_message: { type: string }
        commit_sha: { type: string }
        plan_json_url: { type: string }
        created_by: { type: string }
        started_at: { type: [string, "null"], format: date-time }
        finished_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, workspace_id, org_id, operation, status, created_by, created_at, updated_at]

    CreateRunRequest:
      type: object
      properties:
        operation: { $ref: "#/components/schemas/RunOperation" }
        imports:
          type: array
          items:
            type: object
            properties:
              address: { type: string }
              id: { type: string }
            required: [address, id]

    TofuResourceChange:
      type: object
      properties:
        address: { type: string }
        module_address: { type: string }
        mode: { type: string }
        type: { type: string }
        name: { type: string }
        provider_name: { type: string }
        change:
          type: object
          properties:
            actions:
              type: array
              items: { type: string }
            before:
              type: [object, "null"]
              additionalProperties: true
            after:
              type: [object, "null"]
              additionalProperties: true
          required: [actions, before, after]
      required: [address, mode, type, name, provider_name, change]

    TofuPlanJSON:
      type: object
      properties:
        format_version: { type: string }
        resource_changes:
          type: array
          items: { $ref: "#/components/schemas/TofuResourceChange" }

    StateVersion:
      type: object
      properties:
        id: { type: string }
        workspace_id: { type: string }
        org_id: { type: string }
        run_id: { type: string }
        serial: { type: integer }
        state_url: { type: string }
        resource_count: { type: integer }
        resource_summary: { type: string }
        created_at: { type: string, format: date-time }
      required: [id, workspace_id, org_id, run_id, serial, state_url, resource_count, resource_summary, created_at]

    StateResource:
      type: object
      properties:
        type: { type: string }
        name: { type: string }
        module: { type: string }
        provider: { type: string }
        mode: { type: string }
        attributes:
          type: object
          additionalProperties: true
          description: >-
            Attribute names the instance carries. Values are present only for
            callers who may manage this workspace's state; below that bar every
            value is null and attributes_redacted is true, because tofu writes
            provider secrets into state attributes in cleartext.
        attributes_redacted:
          type: boolean
          description: Attribute values were withheld; the names are complete.
      required: [type, name, module, provider, mode, attributes]

    StateOutput:
      type: object
      properties:
        name: { type: string }
        value: {}
        type: { type: string }
        sensitive: { type: boolean }
      required: [name, value, type, sensitive]

    ResourceDiff:
      type: object
      properties:
        type: { type: string }
        name: { type: string }
        module: { type: string }
        action: { type: string, enum: [added, removed, changed, unchanged] }
        before:
          type: object
          additionalProperties: true
        after:
          type: object
          additionalProperties: true
        changed_keys:
          type: array
          items: { type: string }
        attributes_redacted:
          type: boolean
          description: >-
            before/after values were withheld; the counts and changed_keys are
            the same ones a state manager sees.
      required: [type, name, module, action]

    StateDiff:
      type: object
      properties:
        added: { type: integer }
        removed: { type: integer }
        changed: { type: integer }
        unchanged: { type: integer }
        diffs:
          type: array
          items: { $ref: "#/components/schemas/ResourceDiff" }
      required: [added, removed, changed, unchanged, diffs]

    VariableCategory:
      type: string
      enum: [terraform, env]

    WorkspaceVariable:
      type: object
      properties:
        id: { type: string }
        workspace_id: { type: string }
        org_id: { type: string }
        key: { type: string }
        value: { type: string }
        sensitive: { type: boolean }
        category: { $ref: "#/components/schemas/VariableCategory" }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, workspace_id, org_id, key, value, sensitive, category, description, created_at, updated_at]

    OrgVariable:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        key: { type: string }
        value: { type: string }
        sensitive: { type: boolean }
        category: { $ref: "#/components/schemas/VariableCategory" }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, org_id, key, value, sensitive, category, description, created_at, updated_at]

    PipelineVariable:
      type: object
      properties:
        id: { type: string }
        pipeline_id: { type: string }
        org_id: { type: string }
        key: { type: string }
        value: { type: string }
        sensitive: { type: boolean }
        category: { $ref: "#/components/schemas/VariableCategory" }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, pipeline_id, org_id, key, value, sensitive, category, description, created_at, updated_at]

    CreateVariableRequest:
      type: object
      properties:
        key: { type: string }
        value: { type: string }
        sensitive: { type: boolean }
        category: { $ref: "#/components/schemas/VariableCategory" }
        description: { type: string }
      required: [key, value, sensitive, category]

    EffectiveVariable:
      type: object
      properties:
        key: { type: string }
        value: { type: string }
        sensitive: { type: boolean }
        category: { $ref: "#/components/schemas/VariableCategory" }
        description: { type: string }
        source: { type: string, enum: [org, pipeline, workspace] }
        source_id: { type: string }
      required: [key, value, sensitive, category, description, source, source_id]

    DiscoveredVariable:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        description: { type: string }
        default: { type: string }
        required: { type: boolean }
        configured: { type: boolean }
        configured_by: { type: string, enum: [terragrunt, portal] }
      required: [name, required, configured]

    Team:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        name: { type: string }
        slug: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, org_id, name, slug, created_at, updated_at]

    TeamMember:
      type: object
      properties:
        id: { type: string }
        team_id: { type: string }
        user_id: { type: string }
        role: { type: string }
        cloud_identity: { type: string }
        created_at: { type: string, format: date-time }
        email: { type: string }
        user_name: { type: string }
        avatar_url: { type: string }
      required: [id, team_id, user_id, role, cloud_identity, created_at, email, user_name, avatar_url]

    WorkspaceTeamAccess:
      type: object
      properties:
        id: { type: string }
        workspace_id: { type: string }
        team_id: { type: string }
        role: { type: string }
        created_at: { type: string, format: date-time }
        team_name: { type: string }
        team_slug: { type: string }
      required: [id, workspace_id, team_id, role, created_at, team_name, team_slug]

    Approval:
      type: object
      properties:
        id: { type: string }
        run_id: { type: string }
        org_id: { type: string }
        user_id: { type: string }
        status: { type: string, enum: [approved, rejected] }
        comment: { type: string }
        created_at: { type: string, format: date-time }
        user_name: { type: string }
        avatar_url: { type: string }
      required: [id, run_id, org_id, user_id, status, comment, created_at]

    ApprovalRequest:
      type: object
      properties:
        status: { type: string, enum: [approved, rejected] }
        comment: { type: string }
      required: [status]

    AuditLog:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        user_id: { type: string }
        action: { type: string }
        entity_type: { type: string }
        entity_id: { type: string }
        before_data: {}
        after_data: {}
        ip_address: { type: string }
        user_agent: { type: string }
        created_at: { type: string, format: date-time }
      required: [id, org_id, user_id, action, entity_type, entity_id, before_data, after_data, ip_address, user_agent, created_at]

    Pipeline:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        name: { type: string }
        description: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, org_id, name, description, created_by, created_at, updated_at]

    OnFailure:
      type: string
      enum: [stop, continue]

    PipelineStage:
      type: object
      properties:
        id: { type: string }
        pipeline_id: { type: string }
        workspace_id: { type: string }
        stage_order: { type: integer }
        auto_apply: { type: boolean }
        on_failure: { $ref: "#/components/schemas/OnFailure" }
        created_at: { type: string, format: date-time }
        workspace_name: { type: string }
      required: [id, pipeline_id, workspace_id, stage_order, auto_apply, on_failure, created_at, workspace_name]

    PipelineRunStatus:
      type: string
      enum: [idle, running, completed, errored, cancelled]

    PipelineRun:
      type: object
      properties:
        id: { type: string }
        pipeline_id: { type: string }
        org_id: { type: string }
        status: { $ref: "#/components/schemas/PipelineRunStatus" }
        current_stage: { type: integer }
        total_stages: { type: integer }
        created_by: { type: string }
        started_at: { type: string, format: date-time }
        finished_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, pipeline_id, org_id, status, current_stage, total_stages, created_by, started_at, created_at, updated_at]

    PipelineStageStatus:
      type: string
      enum:
        - pending
        - importing_outputs
        - running
        - awaiting_approval
        - completed
        - errored
        - skipped
        - cancelled

    PipelineRunStage:
      type: object
      properties:
        id: { type: string }
        pipeline_run_id: { type: string }
        stage_id: { type: string }
        workspace_id: { type: string }
        run_id: { type: [string, "null"] }
        stage_order: { type: integer }
        status: { $ref: "#/components/schemas/PipelineStageStatus" }
        auto_apply: { type: boolean }
        on_failure: { $ref: "#/components/schemas/OnFailure" }
        started_at: { type: [string, "null"], format: date-time }
        finished_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        workspace_name: { type: string }
      required: [id, pipeline_run_id, stage_id, workspace_id, stage_order, status, auto_apply, on_failure, created_at, updated_at, workspace_name]

    CreatePipelineStageInput:
      type: object
      properties:
        workspace_id: { type: string }
        auto_apply: { type: boolean }
        on_failure: { $ref: "#/components/schemas/OnFailure" }
      required: [workspace_id, auto_apply, on_failure]

    CreatePipelineRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        stages:
          type: array
          items: { $ref: "#/components/schemas/CreatePipelineStageInput" }
      required: [name, stages]

    UpdatePipelineRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        stages:
          type: array
          items: { $ref: "#/components/schemas/CreatePipelineStageInput" }

    PipelineDetailResponse:
      type: object
      properties:
        pipeline: { $ref: "#/components/schemas/Pipeline" }
        stages:
          type: array
          items: { $ref: "#/components/schemas/PipelineStage" }
      required: [pipeline, stages]

    PipelineRunDetailResponse:
      type: object
      properties:
        pipeline_run: { $ref: "#/components/schemas/PipelineRun" }
        stages:
          type: array
          items: { $ref: "#/components/schemas/PipelineRunStage" }
      required: [pipeline_run, stages]

    Account:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        name: { type: string }
        description: { type: string }
        aws_account_id: { type: string }
        assume_role_arn: { type: string }
        default_region: { type: string }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        external_id_set:
          type: boolean
          description: Whether an assume-role external id is configured; the value itself never leaves the server.
      required: [id, org_id, name, description, aws_account_id, assume_role_arn, default_region, created_by, created_at, updated_at, external_id_set]

    CreateAccountRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        aws_account_id: { type: string }
        assume_role_arn: { type: string }
        external_id: { type: string }
        default_region: { type: string }
      required: [name, aws_account_id, assume_role_arn, default_region]

    UpdateAccountRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        assume_role_arn: { type: string }
        external_id: { type: string }
        default_region: { type: string }

    ClusterConnectionStatus:
      type: string
      enum: [pending, connecting, connected, failed]

    Cluster:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        account_id: { type: string }
        name: { type: string }
        description: { type: string }
        environment: { type: string, enum: [development, staging, production] }
        api_endpoint: { type: string }
        region: { type: string }
        auth_mode:
          type: string
          description: sa_token (stored bearer token) or eks_iam (minted from the account role).
        eks_cluster_name: { type: string }
        connection_status: { $ref: "#/components/schemas/ClusterConnectionStatus" }
        last_connected_at: { type: [string, "null"], format: date-time }
        connection_error: { type: string }
        node_count: { type: integer }
        k8s_version: { type: string }
        argocd_sync_status:
          type: string
          description: Synced | OutOfSync | Unknown | "" (not yet observed).
        argocd_health_status:
          type: string
          description: Healthy | Progressing | Degraded | Missing | ... | "" (not yet observed).
        control_plane_status:
          type: string
          description: ACTIVE | UPDATING | CREATING | DEGRADED | ... | "" (not yet observed).
        platform_version:
          type: string
          description: EKS platform version, e.g. eks.7.
        last_health_observed_at: { type: [string, "null"], format: date-time }
        credentials_set:
          type: boolean
          description: Whether CA bundle + SA token are stored; the ciphertext never leaves the server.
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required:
        [id, org_id, account_id, name, description, environment, api_endpoint,
         region, connection_status, last_connected_at, connection_error,
         node_count, k8s_version, argocd_sync_status, argocd_health_status,
         control_plane_status, platform_version, last_health_observed_at,
         credentials_set, created_by, created_at, updated_at]

    CreateClusterRequest:
      type: object
      properties:
        account_id: { type: string }
        name: { type: string }
        description: { type: string }
        environment: { type: string, enum: [development, staging, production] }
        api_endpoint: { type: string }
        ca_bundle: { type: string }
        sa_token: { type: string }
        region: { type: string }
        auth_mode:
          type: string
          enum: [sa_token, eks_iam]
          description: Defaults to sa_token. eks_iam requires eks_cluster_name and an account assume-role.
        eks_cluster_name: { type: string }
      required: [account_id, name, api_endpoint, ca_bundle, sa_token]

    UpdateClusterRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        environment: { type: string }
        api_endpoint: { type: string }
        ca_bundle: { type: string }
        sa_token: { type: string }
        region: { type: string }

    ClusterOrderInput:
      type: object
      description: >
        The vend form: portal templates an eks-fleet Cluster CR from it and
        commits it to the clusters GitOps repo. account is the 12-digit AWS
        account number (not a portal account id); the eks-fleet defaults cover
        everything optional.
      properties:
        name: { type: string }
        account: { type: string }
        region: { type: string }
        team: { type: string }
        environment: { type: string, enum: [development, staging, production] }
        cluster_version: { type: string }
        system_nodes: { $ref: "#/components/schemas/ClusterOrderSystemNodes" }
        network: { $ref: "#/components/schemas/ClusterOrderNetwork" }
        endpoint_public_access:
          type: boolean
          description: >
            Clusters vend with a private API endpoint (the eks-fleet default).
            Setting this true requires a non-empty endpoint_public_access_cidrs
            allowlist — orders that opt into public access without one are
            rejected with 400 (mirroring the Cluster XRD's CEL rule).
        endpoint_public_access_cidrs:
          type: array
          items: { type: string }
          description: >
            CIDR allowlist scoping who can reach the public endpoint (e.g.
            203.0.113.0/24). Required (non-empty) when endpoint_public_access
            is true; each entry must parse as a CIDR.
      required: [name, account, region, team]

    ClusterOrderSystemNodes:
      type: object
      properties:
        instance_types:
          type: array
          items: { type: string }
        min_size: { type: integer }
        max_size: { type: integer }
        desired_size: { type: integer }
        disk_size: { type: integer }

    ClusterOrderNetwork:
      type: object
      properties:
        vpc_cidr: { type: string }
        max_azs: { type: integer }
        nat_gateways: { type: integer }

    ClusterOperationKind:
      type: string
      enum: [provision, deprovision, unwedge]

    ClusterOperationStatus:
      type: string
      enum: [pending, committed, failed, active, deprovisioned]

    VendPhaseEntry:
      type: object
      properties:
        at: { type: string, format: date-time }
        detail: { type: string }
      required: [at]

    ClusterOperation:
      type: object
      properties:
        id: { type: string }
        org_id: { type: string }
        name: { type: string }
        environment: { type: string }
        team: { type: string }
        operation: { $ref: "#/components/schemas/ClusterOperationKind" }
        status: { $ref: "#/components/schemas/ClusterOperationStatus" }
        git_commit_sha: { type: string }
        error: { type: string }
        spec_json:
          type: object
          additionalProperties: true
          description: The clusterspec input the CR was templated from.
        cluster_id: { type: [string, "null"] }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }
        vend_phases:
          type: object
          additionalProperties: { $ref: "#/components/schemas/VendPhaseEntry" }
          description: >
            Regressible map keyed by phase (committed, tofu_running, active, ...).
            Only portal-side phases advance locally; substrate phases need the
            in-cluster watcher.
      required:
        [id, org_id, name, environment, team, operation, status,
         git_commit_sha, error, spec_json, cluster_id, created_by, created_at,
         completed_at, vend_phases]

    Tenant:
      type: object
      properties:
