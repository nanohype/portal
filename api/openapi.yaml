      operationId: listWorkspaceAccess
      summary: List team-access grants on a workspace
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Grants
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspaceTeamAccessList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: setWorkspaceAccess
