        org_id: { type: string }
        cluster_id: { type: string }
        name: { type: string }
        phase: { type: string }
        spec:
          type: object
          additionalProperties: true
        status:
          type: object
          additionalProperties: true
        last_observed_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, org_id, cluster_id, name, phase, spec, status, last_observed_at, created_at, updated_at]

    CreateTenantRequest:
