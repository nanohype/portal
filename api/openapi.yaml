      responses:
        "200":
          description: Unlocked workspace
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/variables:
    get:
      operationId: listWorkspaceVariables
      summary: List workspace variables
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Variables (sensitive values redacted)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspaceVariableList" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createWorkspaceVariable
      summary: Create a workspace variable (admin)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVariableRequest" }
      responses:
        "201":
          description: Created variable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspaceVariable" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/variables/effective:
    get:
      operationId: listEffectiveVariables
      summary: Merged org → pipeline → workspace variable view
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: pipeline_id, in: query, schema: { type: string } }
      responses:
        "200":
          description: Effective variables
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EffectiveVariable" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/variables/discover:
    post:
      operationId: discoverWorkspaceVariables
      summary: Discover the config's variable surface (viewer)
      description: >
        Parses the staged config (terragrunt render + variables.tf, or plain
        tofu) and returns every module variable with its configured state.
        The `default` field carries the value the config resolves — a terragrunt
        input or a module default — so it is only populated for callers who
        clear the variable-management bar (admin, or an admin team grant on this
        workspace). Below that bar the response is names, types, descriptions
        and provenance with no values, and the terragrunt render that would
        resolve them is skipped. Synchronous; intentionally not list-enveloped.
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Discovered variables
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DiscoveredVariable" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/variables/bulk:
    post:
      operationId: bulkCreateWorkspaceVariables
      summary: Create up to 50 variables in one call (admin)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                variables:
                  type: array
                  items: { $ref: "#/components/schemas/CreateVariableRequest" }
              required: [variables]
      responses:
        "201":
          description: Created variables
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkspaceVariable" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/variables/import-outputs:
    post:
      operationId: importWorkspaceOutputs
      summary: Import another workspace's outputs as variables (admin on both workspaces)
      description: >
        Upserts each of the source workspace's state outputs as a
        terraform-category variable on this one. Outputs the source state marks
        sensitive are skipped: state redacts their values, so there is nothing
        to carry across. A source whose outputs are all sensitive answers 400
        saying so.
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source_workspace_id: { type: string }
              required: [source_workspace_id]
      responses:
        "201":
          description: Imported variables
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkspaceVariable" }
        default: { $ref: "#/components/responses/Error" }

