        git_commit_sha: { type: string }
        error: { type: string }
        values_json:
          type: object
          additionalProperties: true
        template_id: { type: [string, "null"] }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: [string, "null"], format: date-time }
      required:
