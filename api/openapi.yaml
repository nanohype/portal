      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloneWorkspaceRequest" }
      responses:
        "201":
          description: Cloned workspace
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/lock:
