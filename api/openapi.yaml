            application/json:
              schema: { $ref: "#/components/schemas/Workspace" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteWorkspace
      summary: Delete a workspace (admin on the workspace; deleting the last workspace requiring approval on a repository + working directory needs org admin)
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }
        default: { $ref: "#/components/responses/Error" }

  /workspaces/{workspaceId}/upload:
    post:
      operationId: uploadWorkspaceConfig
      summary: Upload a configuration archive (operator)
      description: >
